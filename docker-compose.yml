version: '3.8'

services:
  # Primary Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: twit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Caching
  memcached:
    image: memcached:alpine
    ports:
      - "11211:11211"

  # Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: rootpassword

  # S3 Compatible Storage (MinIO)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: rootpassword
    volumes:
      - minio_data:/data

  # Express Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://root:rootpassword@postgres:5432/twit
      - MEMCACHED_HOST=memcached:11211
      - RABBITMQ_URL=amqp://root:rootpassword@rabbitmq:5672
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=root
      - S3_SECRET_KEY=rootpassword
      - S3_BUCKET=twit-media
      - JWT_SECRET=supersecretkey_change_in_prod
      - PORT=4000
    depends_on:
      - postgres
      - memcached
      - rabbitmq
      - minio

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - API_URL=http://backend:4000
      - NEXT_PUBLIC_S3_PUBLIC_URL=http://localhost:9000/twit-media
    depends_on:
      - backend
      - minio

volumes:
  postgres_data:
  minio_data:
